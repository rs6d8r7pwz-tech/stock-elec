<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bon d'Intervention — Electreau</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --red:        #d42d28;
      --red-dark:   #a81f1a;
      --navy:       #16294a;
      --navy-light: #223d6e;
      --blue:       #0099cc;
      --blue-light: #e0f5fb;
      --blue-mid:   #99d9ef;
      --text:       #1a2636;
      --gray:       #6b7280;
      --border:     #e2e8f0;
      --success:    #16a34a;
      --danger:     #dc2626;
      --white:      #ffffff;
      --bg:         #f0f4f8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--navy);
      box-shadow: 0 3px 16px rgba(0,0,0,0.25);
    }
    .header-inner {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 28px 14px;
    }
    .header-brand {
      font-size: 30px; font-weight: 900;
      letter-spacing: -0.5px; line-height: 1;
    }
    .brand-electr { color: #e63228; }
    .brand-eau    { color: #22c0ee; }
    .header-texts { margin-top: 5px; }
    .header-tagline {
      font-size: 11px; color: rgba(255,255,255,0.5);
      letter-spacing: 0.4px; margin-top: 3px;
    }
    .header-badge {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 20px; padding: 7px 16px;
      font-size: 12px; font-weight: 700;
      color: rgba(255,255,255,0.85);
      white-space: nowrap;
    }
    .header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
    .header-user {
      display: flex; align-items: center; gap: 10px;
    }
    .header-user-name {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.9);
    }
    .header-logout {
      background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25);
      color: #fff; border-radius: 16px; padding: 5px 12px; font-size: 11px;
      font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .header-logout:hover { background: rgba(212,45,40,0.85); border-color: rgba(212,45,40,0.9); }
    .header-nav {
      background: rgba(34,192,238,0.18); border: 1px solid rgba(34,192,238,0.5);
      color: #fff; border-radius: 16px; padding: 5px 12px; font-size: 11px;
      font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s;
    }
    .header-nav:hover { background: rgba(34,192,238,0.4); }

    /* ── LISTE DES ARCHIVES ── */
    .bon-row {
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
      border: 1.5px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin-bottom: 10px; flex-wrap: wrap;
    }
    .bon-row:hover { border-color: var(--blue-mid); }
    .bon-main { min-width: 200px; flex: 1; }
    .bon-nom { font-size: 15px; font-weight: 800; color: var(--navy); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .bon-sub { font-size: 13px; color: var(--text); margin-top: 2px; }
    .bon-date { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .bon-statut {
      font-size: 11px; font-weight: 700; border-radius: 12px; padding: 2px 9px;
    }
    .bon-statut.valide  { background: #dcfce7; color: var(--success); border: 1px solid #86efac; }
    .bon-statut.attente { background: #fef9c3; color: #92400e; border: 1px solid #fde047; }
    .bon-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .bon-act {
      background: #fff; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 7px 11px; font-size: 13px; font-weight: 700; cursor: pointer;
      font-family: inherit; color: var(--navy); transition: all .15s; white-space: nowrap;
    }
    .bon-act:hover { background: var(--blue-light); border-color: var(--blue); }
    .bon-act.primary { background: var(--navy); color: #fff; border-color: var(--navy); }
    .bon-act.primary:hover { background: var(--success); border-color: var(--success); }
    .bon-act.danger { color: var(--danger); border-color: #fca5a5; }
    .bon-act.danger:hover { background: #fee2e2; }

    /* ── CASES TECHNICIENS ── */
    .tech-checks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    @media (max-width: 520px) { .tech-checks { grid-template-columns: 1fr; } }
    .tech-check {
      display: flex; align-items: center; gap: 8px;
      border: 1.5px solid var(--border); border-radius: 9px;
      padding: 9px 11px; cursor: pointer; font-size: 14px; font-weight: 600;
      color: var(--text); text-transform: none; letter-spacing: 0; margin: 0;
      transition: all .15s; background: #fff;
    }
    .tech-check:hover { border-color: var(--blue-mid); }
    .tech-check.on { background: var(--blue-light); border-color: var(--blue); }
    .tech-check input { width: auto; }
    .tech-check em { color: var(--blue); font-style: normal; font-weight: 700; font-size: 12px; }
    .tech-autre-row {
      display: grid; grid-template-columns: 1fr 38px; gap: 8px;
      align-items: center; margin-top: 8px;
    }

    .header-bar { display: flex; height: 4px; }
    .header-bar-red  { flex: 1; background: #e63228; }
    .header-bar-blue { flex: 1; background: #22c0ee; }
    .header-logo-plate {
      background: #fff; border-radius: 12px;
      padding: 10px 18px; display: inline-flex; align-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }
    .header-logo { height: 50px; width: auto; display: block; }
    @media (max-width: 600px) {
      .header-logo { height: 38px; }
      .header-logo-plate { padding: 8px 12px; }
    }

    /* ── LAYOUT ── */
    .container { max-width: 760px; margin: 30px auto; padding: 0 16px 80px; }
    .card {
      background: white; border-radius: 14px;
      box-shadow: 0 2px 18px rgba(22,41,74,0.08);
      padding: 24px 26px; margin-bottom: 18px;
    }
    .card-title {
      font-size: 14px; font-weight: 800; color: var(--navy);
      margin-bottom: 18px; padding-bottom: 10px;
      border-bottom: 2px solid var(--blue-light);
      text-transform: uppercase; letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 9px;
    }
    .card-title::before {
      content: ''; display: block;
      width: 4px; height: 16px;
      background: var(--red); border-radius: 2px; flex-shrink: 0;
    }

    /* ── FIELDS ── */
    .field { margin-bottom: 14px; }
    label {
      display: block; font-size: 11px; font-weight: 700;
      color: var(--gray); margin-bottom: 5px;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    input[type="text"], input[type="date"], input[type="time"],
    input[type="number"], textarea, select {
      width: 100%; padding: 10px 13px;
      border: 1.5px solid var(--border); border-radius: 9px;
      font-size: 15px; transition: border-color 0.2s, box-shadow 0.2s;
      background: white; font-family: inherit; color: var(--text);
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(0,153,204,0.12);
    }
    textarea { resize: vertical; min-height: 80px; }
    .field-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .field-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }

    /* ── TOGGLE ── */
    .toggle-group { display: flex; gap: 6px; }
    .toggle-btn {
      flex: 1; padding: 10px;
      border: 1.5px solid var(--border); border-radius: 9px;
      background: white; cursor: pointer; font-size: 14px; font-weight: 700;
      transition: all 0.15s; font-family: inherit; color: var(--gray);
    }
    .toggle-btn.active {
      background: var(--navy); border-color: var(--navy);
      color: white; box-shadow: 0 2px 8px rgba(22,41,74,0.25);
    }

    /* ── TRAJET BADGES ── */
    .trajet-info { display: flex; gap: 10px; margin-top: 9px; flex-wrap: wrap; }
    .badge {
      background: var(--blue-light); border: 1px solid var(--blue-mid);
      border-radius: 20px; padding: 5px 14px; font-size: 13px; font-weight: 600;
      color: var(--navy); display: inline-flex; align-items: center; gap: 5px;
    }
    .badge.loading { opacity: 0.6; animation: pulse 1s infinite; }
    .badge.error   { background: #fee2e2; border-color: #fca5a5; color: var(--danger); }
    .badge.success-green { background: #dcfce7; border-color: #86efac; color: var(--success); }
    @keyframes pulse { 0%,100% { opacity:.6 } 50% { opacity:1 } }

    /* ── MATÉRIAUX ── */
    .mat-header {
      display: grid; grid-template-columns: 1fr 130px 38px; gap: 8px;
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.4px; color: var(--gray); margin-bottom: 6px;
      padding: 0 4px;
    }
    .materiau-row {
      display: grid; grid-template-columns: 1fr 38px;
      gap: 8px; align-items: center; margin-bottom: 8px;
    }
    .btn-remove {
      width: 38px; height: 38px; border: none;
      background: #fee2e2; color: var(--danger);
      border-radius: 8px; cursor: pointer; font-size: 15px;
      transition: background 0.15s; flex-shrink: 0;
    }
    .btn-remove:hover { background: #fca5a5; }
    .btn-add {
      background: var(--blue-light); color: var(--navy);
      border: 1.5px dashed var(--blue); border-radius: 9px;
      padding: 9px; width: 100%; cursor: pointer; font-size: 14px;
      font-weight: 700; margin-top: 4px; transition: background 0.15s;
      font-family: inherit;
    }
    .btn-add:hover { background: var(--blue-mid); }
    .mat-total {
      text-align: right; font-size: 15px; font-weight: 800; color: var(--navy);
      margin-top: 10px; padding-top: 10px; border-top: 2px solid var(--blue-light);
    }

    /* ── BOUTONS ── */
    .btn-primary {
      background: var(--navy); color: white; border: none; border-radius: 10px;
      padding: 13px 28px; font-size: 15px; font-weight: 800; cursor: pointer;
      transition: all 0.2s; font-family: inherit;
      box-shadow: 0 3px 10px rgba(22,41,74,0.3);
    }
    .btn-primary:hover { background: var(--red); box-shadow: 0 4px 14px rgba(212,45,40,0.35); }
    .btn-primary:disabled { background: var(--border); color: var(--gray); cursor: not-allowed; box-shadow: none; }
    .btn-secondary {
      background: white; color: var(--navy); border: 2px solid var(--navy);
      border-radius: 10px; padding: 11px 22px; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .btn-secondary:hover { background: var(--blue-light); border-color: var(--blue); color: var(--blue); }
    .btn-row { display: flex; gap: 12px; justify-content: flex-end; margin-top: 22px; }

    /* ── ÉTAPES ── */
    .steps {
      display: flex; align-items: center; justify-content: center;
      gap: 6px; margin-bottom: 26px;
    }
    .step-dot {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 800; flex-shrink: 0;
      background: var(--border); color: var(--gray);
    }
    .step-dot.active { background: var(--red); color: white; box-shadow: 0 2px 8px rgba(212,45,40,0.35); }
    .step-dot.done   { background: var(--success); color: white; }
    .step-line { flex: 1; height: 3px; background: var(--border); max-width: 72px; border-radius: 2px; }
    .step-line.done { background: var(--success); }

    /* ── PREVIEW ── */
    .preview-section { margin-bottom: 16px; }
    .preview-section h4 {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .6px; color: var(--navy);
      margin-bottom: 6px; padding-bottom: 4px;
      border-bottom: 2px solid var(--blue-light);
      display: flex; align-items: center; gap: 7px;
    }
    .preview-section h4::before {
      content: ''; display: block;
      width: 3px; height: 13px;
      background: var(--red); border-radius: 2px;
    }
    .preview-table { width: 100%; border-collapse: collapse; }
    .preview-table td { padding: 7px 10px; font-size: 14px; border-bottom: 1px solid var(--blue-light); }
    .preview-table td:first-child { font-weight: 600; color: var(--gray); width: 42%; }
    .preview-table tr:last-child td { border-bottom: none; }

    /* ── SIGNATURES ÉLECTRONIQUES ── */
    .sig-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
    }
    @media (max-width: 560px) { .sig-grid { grid-template-columns: 1fr; } }
    .sig-box { display: flex; flex-direction: column; gap: 6px; }
    .sig-label {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .5px; color: var(--gray);
    }
    .sig-pad-wrap { position: relative; }
    .sig-pad {
      width: 100%; height: 140px; display: block;
      background: #fff; border: 2px dashed var(--blue-light);
      border-radius: 10px; touch-action: none; cursor: crosshair;
    }
    .sig-pad.signed { border-style: solid; border-color: var(--blue); }
    .sig-hint {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%); pointer-events: none;
      color: #b7c6d3; font-size: 13px; font-style: italic;
    }
    .sig-clear {
      align-self: flex-end; background: none; border: none;
      color: var(--gray); font-size: 12px; font-weight: 700;
      cursor: pointer; padding: 2px 4px; text-decoration: underline;
    }
    .sig-clear:hover { color: var(--red); }

    /* ── PHOTOS ── */
    .photo-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px; margin-top: 10px;
    }
    .photo-thumb {
      position: relative; border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; aspect-ratio: 1; background: #f0f4f8;
    }
    .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .photo-del {
      position: absolute; top: 4px; right: 4px; width: 24px; height: 24px;
      border: none; border-radius: 50%; background: rgba(214,45,40,.92);
      color: #fff; font-size: 12px; line-height: 24px; padding: 0; cursor: pointer;
    }
    .photo-note { font-size: 12px; color: var(--gray); margin-top: 6px; }

    /* ── SUCCÈS ── */
    .success-icon  { font-size: 60px; text-align: center; margin: 8px 0 12px; }
    .success-title { font-size: 22px; font-weight: 800; color: var(--success); text-align: center; margin-bottom: 6px; }
    .success-sub   { text-align: center; color: var(--gray); font-size: 15px; line-height: 1.6; }

    /* ── NOTES ── */
    .note {
      background: #fffbeb; border: 1px solid #fcd34d;
      border-radius: 9px; padding: 12px 14px; font-size: 14px;
      color: #92400e; line-height: 1.5;
    }
    .info-box {
      background: var(--blue-light); border: 1px solid var(--blue-mid);
      border-radius: 9px; padding: 10px 14px; font-size: 13px;
      color: var(--navy); line-height: 1.5; margin-top: 6px;
    }
    .duree-site-badge {
      background: #dcfce7; border: 1px solid #86efac;
      border-radius: 9px; padding: 8px 14px; font-size: 14px;
      font-weight: 700; color: #166534; margin-top: 4px; margin-bottom: 8px;
      display: inline-flex; align-items: center; gap: 6px;
    }

    /* ── AUTOCOMPLETE ── */
    .ac-wrap { position: relative; flex: 1; }
    .ac-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: white; border: 1.5px solid var(--blue);
      border-radius: 10px; box-shadow: 0 6px 24px rgba(22,41,74,0.15);
      z-index: 200; max-height: 240px; overflow-y: auto;
    }
    .ac-item {
      padding: 10px 13px; cursor: pointer; font-size: 14px;
      border-bottom: 1px solid var(--blue-light); line-height: 1.4;
      transition: background 0.1s;
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:hover { background: var(--blue-light); }
    .ac-item-main { font-weight: 600; color: var(--text); }
    .ac-item-sub  { font-size: 12px; color: var(--gray); margin-top: 2px; }
    .ac-loading   { padding: 10px 13px; font-size: 13px; color: var(--gray); font-style: italic; }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      .mode-cards, .field-row, .field-row-3 { grid-template-columns: 1fr; }
      .mat-header    { grid-template-columns: 1fr 100px 38px; }
      .materiau-row  { grid-template-columns: 1fr 100px 38px; }
      .header-badge  { display: none; }
      .header-brand  { font-size: 24px; }
    }
  </style>
</head>

// --- Appel RPC Supabase ---
async function sbRpc(fn, params) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_ANON_KEY,
      'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
      'Content-Type': 'application/json',
    },
    body: JSON.stringify(params),
  });
  if (!res.ok) throw new Error('Supabase ' + res.status + ' : ' + (await res.text()));
  return res.json();
}

// ============================================================
// MODE LOCAL (fallback) — hachage PBKDF2 via WebCrypto
// ============================================================
const LOCAL_AUTH_KEY = 'electreau_auth_v1';

function localAuthLoad() {
  try { return JSON.parse(localStorage.getItem(LOCAL_AUTH_KEY) || '{}'); }
  catch(e) { return {}; }
}
function localAuthSave(data) {
  localStorage.setItem(LOCAL_AUTH_KEY, JSON.stringify(data));
}
function randHex(bytes) {
  const a = new Uint8Array(bytes);
  crypto.getRandomValues(a);
  return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
}
async function pbkdf2(pwd, saltHex) {
  const enc = new TextEncoder();
  const salt = Uint8Array.from(saltHex.match(/.{2}/g).map(h => parseInt(h,16)));
  const key = await crypto.subtle.importKey('raw', enc.encode(pwd), 'PBKDF2', false, ['deriveBits']);
  const bits = await crypto.subtle.deriveBits(
    { name:'PBKDF2', salt, iterations:150000, hash:'SHA-256' }, key, 256);
  return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ============================================================
// API D'AUTHENTIFICATION (abstraction backend / local)
// ============================================================
// Renvoie { initialise: bool } — le technicien a-t-il déjà un mot de passe ?
async function authStatus(nom) {
  if (authConfigured()) {
    const rows = await sbRpc('tech_status', { p_nom: nom });
    const r = Array.isArray(rows) ? rows[0] : rows;
    return { initialise: !!(r && r.initialise) };
  }
  const data = localAuthLoad();
  return { initialise: !!data[nom] };
}

// Crée le mot de passe (1re connexion). Renvoie true si OK.
async function authSetPassword(nom, pwd) {
  if (authConfigured()) {
    const ok = await sbRpc('tech_set_password', { p_nom: nom, p_pwd: pwd });
    return ok === true;
  }
  const data = localAuthLoad();
  if (data[nom]) return false; // déjà défini
  const salt = randHex(16);
  data[nom] = { salt, hash: await pbkdf2(pwd, salt) };
  localAuthSave(data);
  return true;
}

// Vérifie le mot de passe. Renvoie true si correct.
async function authLogin(nom, pwd) {
  if (authConfigured()) {
    const ok = await sbRpc('tech_login', { p_nom: nom, p_pwd: pwd });
    return ok === true;
  }
  const data = localAuthLoad();
  const rec = data[nom];
  if (!rec) return false;
  return (await pbkdf2(pwd, rec.salt)) === rec.hash;
}

const SESSION_KEY = 'electreau_session_v1';
function sessionLoad()  { return localStorage.getItem(SESSION_KEY) || null; }
function sessionSave(n) { localStorage.setItem(SESSION_KEY, n); }
function sessionClear() { localStorage.removeItem(SESSION_KEY); }

// Compte de direction (lecture + validation, ne crée pas de bons)
const COMPTE_GESTION = 'Gestion ELECTREAU';
function isGestion() { return state.user === COMPTE_GESTION; }
function roleCourant() { return isGestion() ? 'gestion' : 'technicien'; }

// ============================================================
// ARCHIVES DES BONS (backend Supabase ou fallback local)
// ============================================================
const LOCAL_BONS_KEY = 'electreau_bons_v1';
function localBonsLoad() { try { return JSON.parse(localStorage.getItem(LOCAL_BONS_KEY) || '[]'); } catch(e) { return []; } }
function localBonsSave(a) { localStorage.setItem(LOCAL_BONS_KEY, JSON.stringify(a)); }

// Enregistre un bon. rec = {numero, nom, auteur, techniciens, client, date_intervention, form}
async function bonSave(rec) {
  if (authConfigured()) return await sbRpc('bon_create', { p: rec });
  const a = localBonsLoad();
  const id = 'local-' + Date.now() + '-' + Math.random().toString(36).slice(2,7);
  a.push(Object.assign({ id, valide:false, valide_at:null, created_at:new Date().toISOString() }, rec));
  localBonsSave(a);
  return id;
}

async function bonsList(role, auteur) {
  if (authConfigured()) return (await sbRpc('bons_list', { p_role: role, p_auteur: auteur })) || [];
  let a = localBonsLoad();
  if (role !== 'gestion') a = a.filter(b => b.auteur === auteur);
  a.sort((x,y) => String(y.date_intervention||'').localeCompare(String(x.date_intervention||''))
                || String(y.created_at||'').localeCompare(String(x.created_at||'')));
  return a;
}

async function bonSetValide(id, valide) {
  if (authConfigured()) return await sbRpc('bon_set_valide', { p_id: id, p_valide: valide });
  const a = localBonsLoad();
  const b = a.find(x => x.id === id);
  if (b) { b.valide = valide; b.valide_at = valide ? new Date().toISOString() : null; localBonsSave(a); }
  return !!b;
}

async function bonDelete(id, role, auteur) {
  if (authConfigured()) return await sbRpc('bon_delete', { p_id: id, p_role: role, p_auteur: auteur });
  let a = localBonsLoad();
  const before = a.length;
  a = a.filter(x => !(x.id === id && (role === 'gestion' || x.auteur === auteur)));
  localBonsSave(a);
  return a.length < before;
}

// ============================================================
// POINT DE DÉPART — bureau / GPS / adresse libre
// ============================================================
async function getDepartCoords() {
  const mode = state.form.departMode || 'bureau';
  if (mode === 'gps' && state.form.departGpsCoords) return state.form.departGpsCoords;
  if (mode === 'adresse' && state.form.departCustomCoords) return state.form.departCustomCoords;
  if (!CONFIG.departCoords) await initDepartCoords();
  return CONFIG.departCoords;
}

async function setDepartMode(mode) {
  saveForm();
  state.form.departMode = mode;
  if (mode === 'gps' && !state.form.departGpsCoords) {
    await fetchGpsCoords();
  } else {
    renderApp();
  }
}

async function fetchGpsCoords() {
  if (!navigator.geolocation) { alert('Géolocalisation non disponible sur ce navigateur.'); return; }
  state.isLoadingGps = true;
  renderApp();
  try {
    const pos = await new Promise((res, rej) =>
      navigator.geolocation.getCurrentPosition(res, rej, { timeout: 12000, enableHighAccuracy: true })
    );
    state.form.departGpsCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
  } catch(e) {
    state.form.departGpsCoords = null;
    alert('Impossible de récupérer votre position. Vérifiez les permissions de géolocalisation.');
  }
  state.isLoadingGps = false;
  renderApp();
}

let departAcTimer = null;
function onDepartInput(val) {
  state.form.departCustomAddress = val;
  state.form.departCustomCoords = null;
  clearTimeout(departAcTimer);
  if (val.length < 3) { hideDepartAc(); return; }
  departAcTimer = setTimeout(() => fetchDepartAcSuggestions(val), 300);
}

async function fetchDepartAcSuggestions(q) {
  const feats = await banSearch(q, { limit: 5 });
  const dd = document.getElementById('depart-ac-dropdown');
  if (!dd) return;
  if (!feats.length) { dd.style.display = 'none'; return; }
  dd.innerHTML = feats.map((ft, i) =>
    '<div class="ac-item" onclick="selectDepartSuggestion(' + i + ')">'
    + '<div class="ac-item-main">' + esc(ft.properties.label) + '</div>'
    + '<div class="ac-item-sub">' + esc(ft.properties.context || '') + '</div></div>'
  ).join('');
  dd.style.display = 'block';
  dd._feats = feats;
}

function selectDepartSuggestion(i) {
  const dd = document.getElementById('depart-ac-dropdown');
  if (!dd || !dd._feats) return;
  const feat = dd._feats[i];
  state.form.departCustomAddress = feat.properties.label;
  state.form.departCustomCoords  = { lat: feat.geometry.coordinates[1], lon: feat.geometry.coordinates[0] };
  dd.style.display = 'none';
  renderApp();
}

function hideDepartAc() {
  const dd = document.getElementById('depart-ac-dropdown');
  if (dd) dd.style.display = 'none';
}

function renderDepartInfo(f) {
  if (f.departMode === 'gps') {
    if (state.isLoadingGps) return '<div class="badge loading">📍 Localisation en cours…</div>';
    if (f.departGpsCoords) return '<div class="badge success-green">✓ Position GPS obtenue</div>';
    return '<div class="badge error">⚠️ Position non disponible'
      + ' <button type="button" onclick="fetchGpsCoords()" style="background:none;border:none;color:inherit;cursor:pointer;text-decoration:underline;font-size:inherit;">Réessayer</button></div>';
  }
  if (f.departMode === 'adresse') {
    let html = '<div class="ac-wrap" style="margin-top:8px">'
      + '<input type="text" id="depart-custom" value="' + esc(f.departCustomAddress) + '"'
      + ' placeholder=\"Ex: 12 rue de la Paix, Lyon\" autocomplete=\"off\"'
      + ' oninput=\"onDepartInput(this.value)\">'
      + '<div id=\"depart-ac-dropdown\" class=\"ac-dropdown\" style=\"display:none\"></div>'
      + '</div>';
    if (f.departCustomCoords) html += '<div class="badge success-green" style="margin-top:6px">✓ Adresse localisée</div>';
    return html;
  }
  // bureau (défaut)
  return '<div class="info-box" style="margin-top:8px">🏢 ' + esc(CONFIG.departAddress) + '</div>';
}

  saveForm();

    state.form.km = null;
    state.form.trajetMin = null;
    state.trajetError = null;
    state.form.adresse = '';

function renderLieuBlock(f) {
  if (f.modeIntervention === 'distance') {
    return '<div class="info-box" style="margin-top:4px">🛜 Intervention réalisée à distance depuis nos locaux — aucun déplacement.</div>';

function syncTechnicien() {
  // Recalcule la cha\u00eene d\u00e9riv\u00e9e utilis\u00e9e par l'aper\u00e7u / le PDF
  const f = state.form;
  const tous = [].concat(f.techniciens || [], (f.techAutres || []).filter(Boolean));
  f.technicien = tous.join(', ');
}

function renderTechnicienField(f) {
  const liste = f.techniciens || [];
  const boxes = TECHNICIENS.map(function(t) {
    const checked = liste.includes(t) ? ' checked' : '';
    const isMe = (t === state.user);
    return '<label class="tech-check' + (checked ? ' on' : '') + '">'
      + '<input type="checkbox"' + checked + ' onchange="toggleTechnicien(' + JSON.stringify(t).replace(/"/g,'&quot;') + ', this.checked)">'
      + '<span>' + esc(t) + (isMe ? ' <em>(moi)</em>' : '') + '</span>'
      + '</label>';

  const autres = (f.techAutres || []);
  const autresRows = autres.map(function(nom, i) {
    return '<div class="tech-autre-row">'
      + '<input type="text" value="' + esc(nom) + '" placeholder="Nom d\'un intervenant hors liste" '

// ============================================================
// CALCUL TRAJET (Nominatim + OSRM)
// ============================================================
// ============================================================
// GÉOCODAGE — Base Adresse Nationale (api-adresse.data.gouv.fr)
// API officielle du gouvernement français, précision GPS, gratuite, sans clé
// ============================================================
async function banSearch(query, opts = {}) {
  let url = `https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(query)}&limit=${opts.limit || 1}`;
  if (opts.postcode) url += `&postcode=${opts.postcode}`;
  if (opts.type)     url += `&type=${opts.type}`;
  const r = await fetch(url);
  const data = await r.json();
  return data.features || [];
}

// Géocode une adresse (retourne {lat, lon, label, score})
async function geocode(address) {
  // Essai 1 : adresse complète
  let feats = await banSearch(address);
  if (feats.length && feats[0].properties.score > 0.3) {
    const f = feats[0];
    return { lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0], label: f.properties.label };
  }

  // Essai 2 : sans le numéro de rue
  const sansNum = address.replace(/^\d+[a-zA-Z]?\s+/, '');
  if (sansNum !== address) {
    feats = await banSearch(sansNum);
    if (feats.length && feats[0].properties.score > 0.2) {
      const f = feats[0];
      return { lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0], label: f.properties.label };
    }
  }

  // Essai 3 : extraire code postal + ville (ex: "38300 Bourgoin")
  const pcMatch = address.match(/\b(\d{5})\b/);
  const parts   = address.split(/[,\n]/).map(s => s.trim()).filter(Boolean);
  if (pcMatch && parts.length) {
    feats = await banSearch(parts[parts.length - 1], { postcode: pcMatch[1], type: 'municipality' });
    if (feats.length) {
      const f = feats[0];
      return { lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0], label: f.properties.label };
    }
  }

  // Essai 4 : dernier mot (commune seule)
  if (parts.length) {
    feats = await banSearch(parts[parts.length - 1], { type: 'municipality' });
    if (feats.length) {
      const f = feats[0];
      return { lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0], label: f.properties.label };
    }
  }

  throw new Error('Adresse introuvable. Sélectionnez une suggestion dans la liste déroulante.');
}

// Initialise les coordonnées de départ via la BAN au chargement de la page
async function initDepartCoords() {
  try {
    const cached = localStorage.getItem('electreau_depart_v2');
    if (cached) { CONFIG.departCoords = JSON.parse(cached); return; }
    const feats = await banSearch(CONFIG.departAddress, { limit: 1 });
    if (feats.length) {
      CONFIG.departCoords = { lat: feats[0].geometry.coordinates[1], lon: feats[0].geometry.coordinates[0] };
      localStorage.setItem('electreau_depart_v2', JSON.stringify(CONFIG.departCoords));
    } else {
      // Fallback : centre de Saint-Chef si BAN échoue
      CONFIG.departCoords = { lat: 45.534, lon: 5.364 };
    }
  } catch(e) {
    CONFIG.departCoords = { lat: 45.534, lon: 5.364 };
  }
}

async function osrmRoute(lat1, lon1, lat2, lon2) {
  // alternatives=3 : on demande plusieurs itinéraires puis on garde le PLUS COURT en distance
  const url = `https://router.project-osrm.org/route/v1/driving/${lon1},${lat1};${lon2},${lat2}?overview=false&alternatives=3`;
  const r = await fetch(url);
  const data = await r.json();
  if (data.code !== 'Ok' || !data.routes || !data.routes.length) throw new Error("Impossible de calculer le trajet");
  const best = data.routes.reduce((a, b) => (b.distance < a.distance ? b : a));
  return { distanceM: best.distance, durationS: best.duration };
}

async function calculateTrajet(adresse) {
  state.isLoadingTrajet = true;
  state.trajetError = null;
  renderApp();
  try {
    // Coordonnées de départ selon le mode choisi
    const departC = await getDepartCoords();

    // Coordonnées destination : depuis autocomplétion BAN (précis) ou géocodage BAN
    const dest = state.form.adresseCoords || await geocode(adresse);

    const route = await osrmRoute(departC.lat, departC.lon, dest.lat, dest.lon);
    state.form.km          = Math.round(route.distanceM / 100) / 10 * 2; // km A/R
    state.form.trajetMin   = Math.round(route.durationS / 60) * 2;        // min A/R
  } catch(err) {
    state.trajetError = err.message;
    state.form.km = null;
    state.form.trajetMin = null;
  }
  state.isLoadingTrajet = false;
  renderApp();
}

// ============================================================
// HELPERS
// ============================================================
function calcDureeSite(ha, hd) {
  if (!ha || !hd) return null;
  const [h1,m1] = ha.split(':').map(Number);
  const [h2,m2] = hd.split(':').map(Number);
  const d = (h2*60+m2) - (h1*60+m1);
  return d > 0 ? d : null;
}

function fmtDuree(min) {
  if (!min && min !== 0) return '—';
  const h = Math.floor(min/60), m = min%60;
  if (h === 0) return `${m} min`;
  if (m === 0) return `${h}h`;
  return `${h}h${String(m).padStart(2,'0')}`;
}

function fmtDate(s) {
  if (!s) return '—';
  return new Date(s+'T12:00:00').toLocaleDateString('fr-FR');
}

function totalMat() {
  return state.form.materiaux.reduce((s,m) => s + (parseFloat(m.prix)||0), 0);
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function saveForm() {
  const g = id => document.getElementById(id);
  const f = state.form;
  ['nom','date','client','numero','adresse','heureArrivee','heureDepart','description','remarques']
    .forEach(id => { if (g(id)) f[id] = g(id).value; });
  syncTechnicien();
}

  try {
    doc.addImage(LOGO_DATA_URI, 'PNG', ML, 7.5, 62.5, 13);
  } catch (e) {
    doc.setFont('helvetica','bold'); doc.setFontSize(27);
    doc.setTextColor(...RED);  doc.text('ELECTR', ML, 18);
    const ew = doc.getTextWidth('ELECTR');
    doc.setTextColor(...BLUE); doc.text('eau', ML + ew, 18);
    doc.setFont('helvetica','normal'); doc.setFontSize(8); doc.setTextColor(...GRAY);
    doc.text("Pompage et traitement de l'eau     Télégestion     Supervision", ML, 24.5);
  }

  // Bloc droite : type / n° / date
  doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...NAVY);
  doc.text("BON D'INTERVENTION", RX, 12.5, { align:'right', charSpace:0.4 });
  doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...GRAY);
  doc.text(`N°  ${f.numero || '—'}`, RX, 18.5, { align:'right' });
  doc.text(fmtDate(f.date) || '—', RX, 24.5, { align:'right' });

  hair(30, ML, RX, HAIR, 0.4);
  y = 40;

  function sectionTitle(title) {
    checkBreak(18);
    doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...NAVY);
    doc.text(title.toUpperCase(), ML, y, { charSpace:0.5 });
    doc.setFillColor(...BLUE); doc.rect(ML, y + 1.8, 16, 1, 'F');
    y += 8.5;
  }

  // Champ pleine largeur (label au-dessus, valeur en dessous)
  function field(label, value) {
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...GRAY);
    doc.text(label.toUpperCase(), ML, y + 3.5, { charSpace:0.3 });
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(...INK);
    const lines = doc.splitTextToSize(String(value || '—'), PW);
    doc.text(lines, ML, y + 9.5);
    const h = 11.5 + (lines.length - 1) * 5.8;
    hair(y + h);
    y += h + 1.5;
  }

  // Deux champs côte à côte
  function twoFields(l1, v1, l2, v2) {
    const hw = PW / 2;
    doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...GRAY);
    doc.text(l1.toUpperCase(), ML, y + 3.5, { charSpace:0.3 });
    doc.text(l2.toUpperCase(), ML + hw, y + 3.5, { charSpace:0.3 });
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(...INK);
    doc.text(doc.splitTextToSize(String(v1 || '—'), hw - 4)[0], ML, y + 9.5);
    doc.text(doc.splitTextToSize(String(v2 || '—'), hw - 4)[0], ML + hw, y + 9.5);
    hair(y + 11.5);
    y += 13;
  }

  // ── CLIENT ──
  sectionTitle('Informations client');
  field('Client', f.client);
  if (f.modeIntervention !== 'distance') field("Adresse d'intervention", f.adresse);
  const _nbTech = (f.techniciens ? f.techniciens.length : 0) + (f.techAutres ? f.techAutres.filter(Boolean).length : 0);
  if (_nbTech > 1) {
    field('Techniciens', f.technicien);
    field('Date', fmtDate(f.date));
  } else {
    twoFields('Date', fmtDate(f.date), 'Technicien', f.technicien);
  }
  y += 3;

  // ── MISSION ──
  sectionTitle('Mission effectuée');
  const descLines = doc.splitTextToSize(f.description || '—', PW - 8);
  const dh = Math.max(16, descLines.length * 5.9 + 9);
  checkBreak(dh + 4);
  doc.setFillColor(...T_BLUE); doc.roundedRect(ML, y, PW, dh, 2, 2, 'F');
  doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(...INK);
  doc.text(descLines, ML + 4, y + 7.5);
  y += dh + 5;

  // ── REMARQUES ──
  if (f.hasRemarques && f.remarques) {
    sectionTitle('Remarques');
    const remLines = doc.splitTextToSize(f.remarques, PW - 8);
    const rh = Math.max(14, remLines.length * 5.9 + 9);
    checkBreak(rh + 4);
    doc.setFillColor(...T_AMB); doc.roundedRect(ML, y, PW, rh, 2, 2, 'F');
    doc.setFillColor(245, 200, 70); doc.rect(ML, y, 1.6, rh, 'F');
    doc.setFont('helvetica','normal'); doc.setFontSize(11); doc.setTextColor(...INK);
    doc.text(remLines, ML + 5, y + 7.5);
    y += rh + 5;
  }

  // ── DÉPLACEMENT / INTERVENTION ──
  if (f.modeIntervention === 'distance') {
    sectionTitle('Intervention à distance');
    field('Type', 'À distance — réalisée depuis nos locaux (aucun déplacement)');
    twoFields('Heure de début', f.heureArrivee || '—', 'Heure de fin', f.heureDepart || '—');
    if (f.dureeSiteMin) field("Durée d'intervention", fmtDuree(f.dureeSiteMin));
  } else {
    sectionTitle('Déplacement');
    twoFields(
      'Distance A/R', f.km != null ? `${f.km} km` : '—',
      'Durée trajet A/R', f.trajetMin != null ? fmtDuree(f.trajetMin) : '—'
    );
    twoFields("Heure d'arrivée", f.heureArrivee || '—', 'Heure de départ', f.heureDepart || '—');
    if (f.dureeSiteMin) field('Durée sur site', fmtDuree(f.dureeSiteMin));
  }
  y += 3;

  // ── MATÉRIEL ──
  sectionTitle('Matériel utilisé');
  const mats = f.materiaux.filter(m => m.designation);
  if (!mats.length) {
    doc.setFont('helvetica','italic'); doc.setFontSize(10.5); doc.setTextColor(...LGRAY);
    doc.text('Néant', ML, y + 5); doc.setTextColor(...INK);
    y += 9;
  } else {
    checkBreak(16);
    doc.setFillColor(247, 249, 251); doc.rect(ML, y, PW, 8.5, 'F');
    doc.setFont('helvetica','bold'); doc.setFontSize(9); doc.setTextColor(...NAVY);
    doc.text('DÉSIGNATION', ML + 3, y + 5.6, { charSpace:0.3 });
    hair(y + 8.5, ML, RX, BLUE, 0.6);
    y += 8.5;

    mats.forEach(m => {
      const dl = doc.splitTextToSize(m.designation || '', PW - 6);
      const rowH = Math.max(8.5, dl.length * 5.8 + 3);
      checkBreak(rowH);
      doc.setFont('helvetica','normal'); doc.setFontSize(10.5); doc.setTextColor(...INK);
      doc.text(dl, ML + 3, y + 5.6);
      hair(y + rowH);
      y += rowH;
    });
    y += 2;
  }
  y += 4;

  // ── SIGNATURES ──
  if (y > 232) { doc.addPage(); y = 22; }
  sectionTitle('Signatures');
  y += 1;
  const boxW = (PW - 10) / 2, boxH = 26;
  doc.setFont('helvetica','bold'); doc.setFontSize(8.5); doc.setTextColor(...GRAY);
  doc.text('LE TECHNICIEN', ML, y, { charSpace:0.3 });
  doc.text('LE CLIENT  (bon pour accord)', ML + boxW + 10, y, { charSpace:0.3 });
  y += 2.5;
  doc.setDrawColor(...HAIR); doc.setLineWidth(0.4);
  doc.roundedRect(ML, y, boxW, boxH, 2, 2, 'S');
  doc.roundedRect(ML + boxW + 10, y, boxW, boxH, 2, 2, 'S');
  // Signatures electroniques dessinees dans les cases (avec marge interieure)
  const sigPad = 2.5;
  const drawSig = (dataUrl, boxX) => {
    if (!dataUrl) return;
    const availW = boxW - sigPad * 2, availH = boxH - sigPad * 2;
    let w = availW, h = availH * 0.9;
    try { doc.addImage(dataUrl, 'PNG', boxX + sigPad, y + sigPad, w, h); }
    catch (e) { /* signature ignoree si illisible */ }
  };
  drawSig(f.sigTechnicien, ML);
  drawSig(f.sigClient, ML + boxW + 10);
  doc.setDrawColor(0); doc.setLineWidth(0.2);

  // ── PIED DE PAGE ──
  const now = new Date();
  hair(287, ML, RX, HAIR, 0.25);
  doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...LGRAY);
  doc.text(
    `Electreau   |   Document généré le ${now.toLocaleDateString('fr-FR')} à ${now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'})}`,
    105, 291, { align:'center' }
  );

  // ── PHOTOS (une par page, à partir de la page 2 ; le bon reste entier en page 1) ──
  if (f.hasPhotos && Array.isArray(f.photos) && f.photos.length) {
    const nb = f.photos.length;
    f.photos.forEach((dataUrl, idx) => {
      doc.addPage();
      // bandeau de marque
      doc.setFillColor(...RED);  doc.rect(0, 0, 105, 2.5, 'F');
      doc.setFillColor(...BLUE); doc.rect(105, 0, 105, 2.5, 'F');
      // titre
      doc.setFont('helvetica','bold'); doc.setFontSize(11); doc.setTextColor(...NAVY);
      doc.text('Photos jointes', ML, 16);
      doc.setFont('helvetica','normal'); doc.setFontSize(9); doc.setTextColor(...GRAY);
      doc.text(`Photo ${idx + 1} / ${nb}`, RX, 16, { align:'right' });
      hair(19, ML, RX, HAIR, 0.4);
      // image centrée, ratio préservé, dans la zone disponible
      try {
        const props = doc.getImageProperties(dataUrl);
        const availW = PW, availH = 297 - 24 - 14;   // haut ~24mm, bas ~14mm
        const ratio = Math.min(availW / props.width, availH / props.height);
        const w = props.width * ratio, h = props.height * ratio;
        const x = ML + (availW - w) / 2, yImg = 24 + (availH - h) / 2;
        doc.addImage(dataUrl, 'JPEG', x, yImg, w, h);
      } catch (e) { /* photo ignorée si illisible */ }
      // pied de page
      hair(287, ML, RX, HAIR, 0.25);
      doc.setFont('helvetica','normal'); doc.setFontSize(7.5); doc.setTextColor(...LGRAY);
      doc.text(
        `Electreau   |   Bon ${f.numero || ''}${f.client ? '  —  ' + f.client : ''}`,
        105, 291, { align:'center' }
      );
    });
  }

  const fn = `bon_${(f.client||'client').replace(/\s+/g,'_')}_${f.date||today()}.pdf`;
  doc.save(fn);
}

// ============================================================
// RENDER
// ============================================================
const app = document.getElementById('app');

function renderApp() {
  updateHeaderUser();
  if (!state.user) { renderLogin(); return; }
  if (isGestion()) { renderArchives(); return; }   // direction : archives uniquement
  if (state.view === 'archives') { renderArchives(); return; }
  switch(state.step) {
    case 1: renderForm(); break;
    case 2: renderPreview(); break;
    case 3: renderDone(); break;
  }
}

// ============================================================
// ÉCRAN DE CONNEXION
// ============================================================
function updateHeaderUser() {
  const el = document.getElementById('header-user');
  if (!el) return;
  if (state.user) {

    if (!isGestion()) {

async function onLoginNomSelect(nom) {
  state.loginNom = nom;
  state.loginError = '';
  state.loginInitialise = null;
  if (!nom) { renderApp(); return; }
  renderApp();
  try {
    const st = await authStatus(nom);
    state.loginInitialise = st.initialise;
  } catch(e) {
    state.loginError = "Connexion au serveur impossible. Réessayez.";
    state.loginInitialise = null;
  }
  renderApp();
}

async function doLogin() {
  const pwd = (document.getElementById('login-pwd') || {}).value || '';
  if (!pwd) { state.loginError = 'Saisissez votre mot de passe.'; renderApp(); return; }
  state.loginBusy = true; state.loginError = ''; renderApp();
  try {
    const ok = await authLogin(state.loginNom, pwd);
    if (ok) { onLoginSuccess(state.loginNom); return; }
    state.loginError = 'Mot de passe incorrect.';
  } catch(e) {
    state.loginError = 'Erreur de connexion au serveur.';
  }
  state.loginBusy = false; renderApp();
}

async function doCreatePassword() {
  const pwd  = (document.getElementById('login-pwd')  || {}).value || '';
  const pwd2 = (document.getElementById('login-pwd2') || {}).value || '';
  if (pwd.length < 4) { state.loginError = 'Le mot de passe doit faire au moins 4 caractères.'; renderApp(); return; }
  if (pwd !== pwd2)  { state.loginError = 'Les deux mots de passe ne correspondent pas.'; renderApp(); return; }
  state.loginBusy = true; state.loginError = ''; renderApp();
  try {
    const ok = await authSetPassword(state.loginNom, pwd);
    if (ok) { onLoginSuccess(state.loginNom); return; }
    state.loginError = "Ce compte a déjà un mot de passe. Reconnectez-vous.";
    state.loginInitialise = true;
  } catch(e) {
    state.loginError = 'Erreur de connexion au serveur.';
  }
  state.loginBusy = false; renderApp();
}

function onLoginSuccess(nom) {
  state.user = nom;
  sessionSave(nom);
  state.loginBusy = false;
  state.loginError = '';
  state.step = 1;
  state.archRecherche = '';
  state.archFiltre = 'tous';
  if (nom === COMPTE_GESTION) {
    state.view = 'archives';
    loadArchives();          // charge tous les bons (rend l'écran)
  } else {
    state.view = 'form';
    state.form = newForm();  // technicien connecté coché par défaut
    renderApp();
  }
}

function logout() {
  sessionClear();
  try { (window.top||window).location.href = "/login"; } catch(e) { location.href = "/login"; }
  return;
  state.user = null;
  state.loginNom = '';
  state.loginInitialise = null;
  state.loginError = '';
  state.step = 1;
  state.view = 'form';
  state.archives = [];
  state.archRecherche = '';
  state.archFiltre = 'tous';
  renderApp();
}

function steps(current) {
  const labels = ['Saisie','Vérification','Terminé'];
  return `
    <div class="steps">
      ${labels.map((l,i)=>{
        const n = i+1;
        const cls = n<current ? 'done' : n===current ? 'active' : '';
        const icon = n<current ? '✓' : n;
        const lineCls = n<current ? 'done' : '';
        return `
          <div class="step-dot ${cls}" title="${l}">${icon}</div>
          ${n<labels.length ? `<div class="step-line ${lineCls}"></div>` : ''}
        `;
      }).join('')}
    </div>`;
}

// ── Zones de signature electronique (souris + tactile) ──
function initSignaturePads() {
  ['technicien', 'client'].forEach(key => {
    const canvas = document.getElementById('sig-' + key);
    if (!canvas) return;
    const hint = document.getElementById('sig-' + key + '-hint');
    const ctx = canvas.getContext('2d');

    const ratio = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    canvas.width  = Math.round(rect.width  * ratio);
    canvas.height = Math.round(rect.height * ratio);
    ctx.scale(ratio, ratio);
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.strokeStyle = '#0f2540';

    const saved = state.form['sig' + key.charAt(0).toUpperCase() + key.slice(1)];
    if (saved) {
      const img = new Image();
      img.onload = () => ctx.drawImage(img, 0, 0, rect.width, rect.height);
      img.src = saved;
      canvas.classList.add('signed');
      if (hint) hint.style.display = 'none';
    }

    let drawing = false, hasDrawn = false;
    const pos = e => {
      const r = canvas.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - r.left, y: p.clientY - r.top };
    };
    const start = e => {
      e.preventDefault();
      drawing = true;
      if (hint) hint.style.display = 'none';
      const { x, y } = pos(e);
      ctx.beginPath();
      ctx.moveTo(x, y);
    };
    const move = e => {
      if (!drawing) return;
      e.preventDefault();
      const { x, y } = pos(e);
      ctx.lineTo(x, y);
      ctx.stroke();
      hasDrawn = true;
    };
    const end = () => {
      if (!drawing) return;
      drawing = false;
      if (hasDrawn) {
        canvas.classList.add('signed');
        saveSignature(key, canvas);
      }
    };

    canvas.addEventListener('mousedown', start);
    canvas.addEventListener('mousemove', move);
    window.addEventListener('mouseup', end);
    canvas.addEventListener('touchstart', start, { passive: false });
    canvas.addEventListener('touchmove', move, { passive: false });
    canvas.addEventListener('touchend', end);
  });
}

function saveSignature(key, canvas) {
  const field = 'sig' + key.charAt(0).toUpperCase() + key.slice(1);
  state.form[field] = canvas.toDataURL('image/png');
}

function clearSignature(key) {
  const canvas = document.getElementById('sig-' + key);
  if (canvas) {
    canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
    canvas.classList.remove('signed');
  }
  const hint = document.getElementById('sig-' + key + '-hint');
  if (hint) hint.style.display = '';
  const field = 'sig' + key.charAt(0).toUpperCase() + key.slice(1);
  state.form[field] = null;
}

async function fetchAcSuggestions(query) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd) return;
  dd.style.display = 'block';
  dd.innerHTML = '<div class="ac-loading">🔍 Recherche en cours…</div>';
  try {
    // BAN — Base Adresse Nationale (api officielle France)
    const feats = await banSearch(query, { limit: 6 });
    if (!feats.length) {
      dd.innerHTML = '<div class="ac-loading">Aucun résultat. Essayez d\'ajouter le code postal ou la commune.</div>';
      return;
    }
    dd.innerHTML = feats.map((f, i) => {
      const p = f.properties;
      // Ligne principale : numéro + nom de rue ou nom du lieu
      const main = p.type === 'housenumber'
        ? `${p.housenumber || ''} ${p.street || p.name || ''}`.trim()
        : (p.street || p.name || p.label.split(',')[0]);
      // Ligne secondaire : code postal + commune
      const sub = [p.postcode, p.city || p.municipality].filter(Boolean).join(' ');
      return `<div class="ac-item" onmousedown="selectAcSuggestion(${i})">
        <div class="ac-item-main">${esc(main)}</div>
        <div class="ac-item-sub">📍 ${esc(sub)}</div>
      </div>`;
    }).join('');
    dd._feats = feats;
  } catch(e) {
    dd.innerHTML = '<div class="ac-loading" style="color:var(--danger)">⚠️ Service de recherche indisponible.</div>';
  }
}

function selectAcSuggestion(idx) {
  const dd = document.getElementById('ac-dropdown');
  if (!dd || !dd._feats) return;
  const f = dd._feats[idx];
  if (!f) return;

  // Label propre : "numéro rue, code_postal commune"
  const p = f.properties;
  const adresseComplete = p.label;

  const inp = document.getElementById('adresse');
  if (inp) inp.value = adresseComplete;
  state.form.adresse      = adresseComplete;
  // Coordonnées précises BAN — évite toute étape de géocodage supplémentaire
  state.form.adresseCoords = { lat: f.geometry.coordinates[1], lon: f.geometry.coordinates[0] };

  closeAcDropdown();
}

function closeAcDropdown() {
  const dd = document.getElementById('ac-dropdown');
  if (dd) { dd.style.display = 'none'; dd.innerHTML = ''; }
}

function lancerCalculTrajet() {
  const adresse = document.getElementById('adresse')?.value?.trim();
  if (!adresse) { alert("Veuillez saisir une adresse d'intervention."); return; }
  saveForm();
  state.form.adresse = adresse;
  calculateTrajet(adresse);
}

function updateDureeSite() {
  const ha = document.getElementById('heureArrivee')?.value;
  const hd = document.getElementById('heureDepart')?.value;
  state.form.heureArrivee = ha || '';
  state.form.heureDepart  = hd || '';
  const dsm = calcDureeSite(ha, hd);
  state.form.dureeSiteMin = dsm;
  const el = document.getElementById('duree-site-display');
  const lbl = state.form.modeIntervention === 'distance' ? "Durée d'intervention" : 'Durée sur site';
  if (el) el.innerHTML = dsm
    ? `<div class="duree-site-badge">⏱️ ${lbl} : ${fmtDuree(dsm)}</div>`
    : '';
}

function setRemarques(v) {
  saveForm();
  state.form.hasRemarques = v;
  renderApp();
}

function setPhotos(v) {
  saveForm();
  state.form.hasPhotos = v;
  renderApp();
}

// Ajoute des photos : compression (max 1400px, JPEG ~0.72) pour un PDF léger
function addPhotos(fileList) {
  const files = Array.from(fileList || []);
  if (!files.length) return;
  saveForm();
  let pending = files.length;
  const done = () => { if (--pending === 0) renderApp(); };
  files.forEach(file => {
    if (!file.type || !file.type.startsWith('image/')) { done(); return; }
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        const MAX = 1400;
        let w = img.width, h = img.height;
        if (w >= h && w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
        else if (h > w && h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
        const cv = document.createElement('canvas');
        cv.width = w; cv.height = h;
        cv.getContext('2d').drawImage(img, 0, 0, w, h);
        try { state.form.photos.push(cv.toDataURL('image/jpeg', 0.72)); } catch (err) {}
        done();
      };
      img.onerror = done;
      img.src = e.target.result;
    };
    reader.onerror = done;
    reader.readAsDataURL(file);
  });
}

function removePhoto(i) {
  saveForm();
  state.form.photos.splice(i, 1);
  renderApp();
}

function addMat() {
  saveForm();
  state.form.materiaux.push({designation:'', prix:''});
  renderApp();
}

function removeMat(i) {
  saveForm();
  state.form.materiaux.splice(i,1);
  renderApp();
}

function updateMat(i, field, val) {
  state.form.materiaux[i][field] = val;
}

function submitForm(e) {
  e.preventDefault();
  saveForm();
  state.form.dureeSiteMin = calcDureeSite(state.form.heureArrivee, state.form.heureDepart);
  state.step = 2;
  renderApp();
}

function goBack() {
  if (state.step > 1) { state.step--; renderApp(); }
}

function backToForm() {
  state.step = 2;
  renderApp();
}

function doGenerate() {
  generatePDF();
  state.step = 3;
  renderApp();
}

// Génère le PDF ET archive le bon (1re génération depuis la vérification)
async function genererEtArchiver() {
  const f = state.form;
  if (!f.nom || !f.nom.trim()) {
    f.nom = (f.client ? f.client + ' — ' : '') + fmtDate(f.date);
  }
  generatePDF();
  try {
    await bonSave({
      numero: f.numero, nom: f.nom, auteur: state.user,
      techniciens: f.technicien, client: f.client,
      date_intervention: f.date, form: f,
    });
    state.archiveErreur = '';
  } catch(e) {
    console.warn('Archivage échoué', e);
    state.archiveErreur = "Le PDF a été généré, mais l'archivage en ligne a échoué (le bon n'apparaîtra pas dans les archives). Vérifiez la connexion / la configuration Supabase.";
  }
  state.step = 3;
  renderApp();
}

// ============================================================
// NAVIGATION ARCHIVES
// ============================================================
function goArchives() { state.view = 'archives'; loadArchives(); }
function goForm() { state.view = 'form'; renderApp(); }

async function loadArchives() {
  state.archivesLoading = true; state.archivesError = '';
  renderApp();
  try {
    state.archives = await bonsList(roleCourant(), state.user) || [];
  } catch(e) {
    state.archives = [];
    state.archivesError = 'Impossible de charger les archives (connexion / configuration).';
  }
  state.archivesLoading = false;
  renderApp();
}

function setArchFiltre(fl) { state.archFiltre = fl; renderArchives(); }
function onArchRecherche(v) { state.archRecherche = v; renderArchivesList(); }

function archivesFiltrees() {
  let list = (state.archives || []).slice();
  if (state.archFiltre === 'attente') list = list.filter(b => !b.valide);
  else if (state.archFiltre === 'valide') list = list.filter(b => b.valide);
  const q = (state.archRecherche || '').trim().toLowerCase();
  if (q) list = list.filter(b => ((b.techniciens||'') + ' ' + (b.auteur||'') + ' ' + (b.nom||'') + ' ' + (b.client||'')).toLowerCase().includes(q));
  return list;
}

function renderArchives() {
  state.view = 'archives';
  const gestion = isGestion();
  const total = (state.archives || []).length;
  const nbAttente = (state.archives || []).filter(b => !b.valide).length;
  const nbValide  = total - nbAttente;

  const fb = (val, label) =>
    '<button type="button" class="toggle-btn ' + (state.archFiltre === val ? 'active' : '') + '" '
    + 'onclick="setArchFiltre(\'' + val + '\')">' + label + '</button>';

  app.innerHTML =
    '<div class="card">'
    + '<div class="card-title">📁 ' + (gestion ? 'Tous les bons (' + total + ')' : 'Mes bons (' + total + ')') + '</div>'
    + (authConfigured() ? '' : '<div class="info-box" style="margin-bottom:14px">ℹ️ Mode local : seuls les bons enregistrés sur cet appareil sont visibles. Configurez Supabase pour partager les archives.</div>')
    + (state.archivesError ? '<div class="badge error" style="margin-bottom:12px">⚠️ ' + esc(state.archivesError) + '</div>' : '')
    + '<div class="field"><div class="toggle-group">'
    +   fb('tous', 'Tous (' + total + ')')
    +   fb('attente', '⏳ En attente (' + nbAttente + ')')
    +   fb('valide', '✓ Validés (' + nbValide + ')')
    + '</div></div>'
    + '<div class="field"><label>Rechercher (technicien, client, nom du bon)</label>'
    +   '<input type="text" id="arch-search" list="arch-tech-list" value="' + esc(state.archRecherche) + '" '
    +   'placeholder="Ex: Brochier, Morestel…" oninput="onArchRecherche(this.value)">'
    +   '<datalist id="arch-tech-list">' + TECHNICIENS.map(t => '<option value="' + esc(t) + '">').join('') + '</datalist>'
    + '</div>'
    + '<div id="arch-list"></div>'
    + '</div>';

  renderArchivesList();
}

function renderArchivesList() {
  const cont = document.getElementById('arch-list');
  if (!cont) return;
  const gestion = isGestion();

  if (state.archivesLoading) { cont.innerHTML = '<div class="badge loading" style="margin-top:8px">⏳ Chargement…</div>'; return; }

  const list = archivesFiltrees();
  if (!list.length) {
    cont.innerHTML = '<p style="color:var(--gray);font-style:italic;font-size:14px;margin-top:10px">Aucun bon à afficher.</p>';
    return;
  }

  cont.innerHTML = list.map(function(b) {
    const idJs = "'" + String(b.id).replace(/'/g,"\\'") + "'";
    const statut = b.valide
      ? '<span class="bon-statut valide">✓ Validé</span>'
      : '<span class="bon-statut attente">⏳ En attente</span>';
    let actions = '<button type="button" class="bon-act" onclick="regenererBon(' + idJs + ')">📄 PDF</button>';
    if (!gestion) actions += '<button type="button" class="bon-act" onclick="ouvrirBon(' + idJs + ')">✏️ Rouvrir</button>';
    if (gestion) actions += '<button type="button" class="bon-act ' + (b.valide ? '' : 'primary') + '" onclick="toggleValide(' + idJs + ',' + (!b.valide) + ')">' + (b.valide ? 'Dévalider' : '✓ Valider') + '</button>';
    actions += '<button type="button" class="bon-act danger" onclick="supprimerBon(' + idJs + ')">🗑</button>';

    const sousTitre = [b.client, gestion ? ('par ' + (b.auteur || '—')) : (b.techniciens || '')].filter(Boolean).join(' · ');

    return '<div class="bon-row">'
      + '<div class="bon-main">'
      +   '<div class="bon-nom">' + esc(b.nom || b.numero || 'Bon') + ' ' + statut + '</div>'
      +   '<div class="bon-sub">' + esc(sousTitre) + '</div>'
      +   '<div class="bon-date">' + (b.date_intervention ? fmtDate(b.date_intervention) : '—') + (b.numero ? ' · N° ' + esc(b.numero) : '') + '</div>'
      + '</div>'
      + '<div class="bon-actions">' + actions + '</div>'
      + '</div>';
  }).join('');
}

async function toggleValide(id, val) {
  try { await bonSetValide(id, val); } catch(e) { alert('Échec de la mise à jour.'); return; }
  await loadArchives();
}

async function supprimerBon(id) {
  if (!confirm('Supprimer ce bon définitivement ?')) return;
  let ok = false;
  try { ok = await bonDelete(id, roleCourant(), state.user); } catch(e) { alert('Échec de la suppression.'); return; }
  if (ok) await loadArchives();
  else alert("Suppression non autorisée pour ce bon.");
}

function regenererBon(id) {
  const b = (state.archives || []).find(x => String(x.id) === String(id));
  if (!b || !b.form) { alert('Données du bon introuvables.'); return; }
  const keep = state.form;
  state.form = b.form;
  try { generatePDF(); } finally { state.form = keep; }
}

function ouvrirBon(id) {
  const b = (state.archives || []).find(x => String(x.id) === String(id));
  if (!b || !b.form) { alert('Données du bon introuvables.'); return; }
  state.form = Object.assign(newForm(), JSON.parse(JSON.stringify(b.form)));
  state.view = 'form';
  state.step = 1;
  renderApp();
}

function nouveauBon() {
  const u = state.user, arch = state.archives;
  state = { user: u, step: 1, form: newForm(), isLoadingTrajet: false, trajetError: null, isLoadingGps: false,
            loginNom: '', loginInitialise: null, loginBusy: false, loginError: '',
            view: 'form', archives: arch || [], archivesLoading: false, archivesError: '',
            archFiltre: 'tous', archRecherche: '', archiveErreur: '' };
  renderApp();
}

// ===============================================

// ============================================================
// DÉMARRAGE DE L'APPLICATION
// ============================================================
state.user = sessionLoad();
if (!state.user) { try { (window.top||window).location.href = "/login"; } catch(e) { location.href = "/login"; } }
else {
  state.form = newForm();
  initDepartCoords();
  if (isGestion()) { state.view = "archives"; loadArchives(); }
  else renderApp();
}

</script>
<script>(function(){if(window.top===window.self)return;var last=0;function ping(){var n=Date.now();if(n-last>20000){last=n;try{window.parent.postMessage({type:"electreau-activity"},location.origin);}catch(e){}}}["mousemove","mousedown","keydown","touchstart","scroll","click"].forEach(function(ev){window.addEventListener(ev,ping,{passive:true});});ping();})();</script>
